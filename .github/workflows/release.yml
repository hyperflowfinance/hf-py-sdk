name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # OIDC for PyPI trusted publishing

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so hatch-vcs can read the version

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install ariadne-codegen build

      - name: Generate client from live schema
        run: python codegen/generate.py
        env:
          # Required because the live endpoint needs a key to introspect.
          HYPERFLOW_AUTH_VALUE: ${{ secrets.HYPERFLOW_AUTH_VALUE }}
          HYPERFLOW_AUTH_HEADER: ${{ vars.HYPERFLOW_AUTH_HEADER }}
          HYPERFLOW_API_URL: ${{ vars.HYPERFLOW_API_URL }}

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
